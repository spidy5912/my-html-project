<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ffb6c1, #ff69b4);
  color: white;
  overflow-x: hidden;
}

/* Screen setup */
.screen {
  display: none;
  min-height: 100vh;
  width: 100%;
  box-sizing: border-box;
  padding: 20px;
  text-align: center;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active { display: flex; }

.fancy {
  font-family: 'Pacifico', cursive;
  font-size: clamp(1.8rem, 5vw, 2.4rem);
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
  margin: 10px 0;
}

button {
  width: 80%;
  max-width: 250px;
  padding: 12px 20px;
  margin-top: 20px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #ff1493, #ff69b4);
  color: white;
  font-size: clamp(14px, 4vw, 18px);
  cursor: pointer;
}

img {
  max-width: 90%;
  height: auto;
  margin-bottom: 20px;
  border-radius: 15px;
}

@media (max-width: 500px) {
  .screen { padding: 15px; }
  .fancy { font-size: clamp(1.5rem, 6vw, 2rem); }
  button { font-size: clamp(14px, 4vw, 16px); }
}
</style>
</head>
<body>

<!-- Screens -->
<div class="screen active" id="screen1">
  <h1 id="countdown" class="fancy">3</h1>
</div>

<div class="screen" id="screen2">
  <img src="image1.png" alt="loading">
  <h1 class="fancy">Loading your birthday surprise...</h1>
</div>

<div class="screen" id="screen3">
  <h1 class="fancy">Tap anywhere 💖</h1>
</div>

<div class="screen" id="screen4">
  <img src="gif1.gif" alt="gif1">
  <h1 class="fancy">Meri Bhaluu turned 17 today 🎉</h1>
  <button onclick="nextScreen(5)">Next ➡️</button>
</div>

<div class="screen" id="screen5">
  <h1 class="fancy">A Cake For You 🎂</h1>
  <img src="gif2.gif" alt="cake">
  <button onclick="nextScreen(6)">Yayy 🎉</button>
</div>

<div class="screen" id="screen6" style="align-items:flex-start; overflow-y:auto;">
  <h1 class="fancy" style="padding:15px 10px; width:100%; text-align:center;">A Special Message For You 💖</h1>
  <div style="width:100%; display:flex; justify-content:center;">
    <div id="messageContainer" style="max-width:700px; text-align:left; line-height:1.6; padding:10px;"></div>
  </div>
</div>

<script>
let current = 1;

function nextScreen(num) {
  document.getElementById('screen' + current).classList.remove('active');
  document.getElementById('screen' + num).classList.add('active');
  current = num;

  if (num === 6) showMessage();
}

// Countdown
document.addEventListener("DOMContentLoaded", () => {
  let count = 3;
  const countdownEl = document.getElementById('countdown');

  function runCountdown() {
    if (!countdownEl) return;

    countdownEl.innerText = count;
    count--;

    if (count >= 0) {
      setTimeout(runCountdown, 1000);
    } else {
      nextScreen(2);
      setTimeout(() => nextScreen(3), 2000);
    }
  }

  runCountdown();
});

// Tap screen
window.addEventListener('click', () => {
  if (current === 3) nextScreen(4);
});

// Paragraph messages
const paragraphs = [
"Meri pyaari si Bhaluu,",
"Sach bolu toh aap ekdum God gifted ho ✨ ...",
"Happy Birthday meri pyaari si Kaynat ❤️ Hamesha sukhi raho zindagi bhar 💖"
];

function showMessage() {
  const container = document.getElementById("messageContainer");
  container.innerHTML = "";

  paragraphs.forEach((text, index) => {
    const p = document.createElement("p");
    p.innerText = text;
    p.style.opacity = 0;
    p.style.transform = "translateY(20px)";
    p.style.transition = "all 0.6s ease";

    container.appendChild(p);

    setTimeout(() => {
      p.style.opacity = 1;
      p.style.transform = "translateY(0)";
    }, index * 700);
  });
}
</script>

</body>
</html>
