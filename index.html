<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff9ac6, #ff4fa3);
  color: white;
}

.screen {
  display: none;
  height: 100vh;
  width: 100vw;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.active { display: flex; }

.fancy {
  font-family: 'Pacifico', cursive;
  font-size: 2.2rem;
}

button {
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  background: #ff1493;
  color: white;
  margin-top: 20px;
}

img {
  max-width: 80%;
  border-radius: 10px;
}

/* Chat */
#messageContainer {
  width: 90%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
}

.msg {
  padding: 10px 15px;
  margin: 8px 0;
  border-radius: 15px;
  max-width: 80%;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.5s;
}

.left { background: rgba(255,255,255,0.2); align-self: flex-start; }
.right { background: #ff1493; align-self: flex-end; }

.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<div class="screen active" id="screen1">
  <h1 id="count">3</h1>
</div>

<div class="screen" id="screen2">
  <img src="image1.png">
  <h1>Loading your birthday surprise...</h1>
</div>

<div class="screen" id="screen3">
  <h1>Tap anywhere 💖</h1>
</div>

<div class="screen" id="screen4">
  <img src="gif1.gif">
  <h1>Meri Bhaluu turned 17 🎉</h1>
  <button onclick="go(5)">Next</button>
</div>

<div class="screen" id="screen5">
  <img src="gif2.gif">
  <button onclick="go(6)">Yayy 🎉</button>
</div>

<div class="screen" id="screen6" style="overflow-y:auto;">
  <h2>A Special Message 💖</h2>
  <div id="messageContainer"></div>
</div>

<script>
let current = 1;

function go(n) {
  document.getElementById("screen"+current).classList.remove("active");
  document.getElementById("screen"+n).classList.add("active");
  current = n;

  if(n===6) showMsg();
}

/* 🔥 STABLE COUNTDOWN */
let c = 3;
let counter = setInterval(()=>{
  document.getElementById("count").innerText = c;

  if(c===0){
    clearInterval(counter);

    setTimeout(()=>{
      go(2);
      setTimeout(()=>go(3),2000);
    },800);
  }

  c--;
},1000);

/* Tap */
document.addEventListener("click",()=>{
  if(current===3) go(4);
});

/* Message */
const text = [
"Meri pyaari si Bhaluu,",
"Sach bolu toh na aap ekdum God gifted ho ✨",
"Aap hamesha mere saath rehti ho 🤍",
"Aur aapke voice notes… uff 😭💖",
"Aap bohot special ho 💎",
"Aur haan… bauni hi rahogi 😂",
"Best of luck for NEET 💪",
"Happy Birthday ❤️"
];

function showMsg(){
  let box = document.getElementById("messageContainer");

  text.forEach((t,i)=>{
    let d = document.createElement("div");
    d.className = "msg " + (i%2?"right":"left");
    d.innerText = t;
    box.appendChild(d);

    setTimeout(()=>d.classList.add("show"), i*600);
  });
}
</script>

</body>
</html>
