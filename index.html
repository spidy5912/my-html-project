<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff9ac6, #ff4fa3);
  color: white;
}

/* Screens */
.screen {
  display: none;
  min-height: 100vh;
  width: 100%;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

.active { display: flex; }

/* Fancy text */
.fancy {
  font-family: 'Pacifico', cursive;
  font-size: clamp(1.8rem, 5vw, 2.5rem);
}

/* Button */
button {
  width: 80%;
  max-width: 250px;
  padding: 12px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff1493, #ff69b4);
  color: white;
  font-size: 16px;
  margin-top: 20px;
  cursor: pointer;
}

/* Images */
img {
  max-width: 90%;
  border-radius: 15px;
  margin-bottom: 20px;
}

/* Chat UI */
#messageContainer {
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
}

.message {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 12px 16px;
  border-radius: 18px;
  margin-bottom: 10px;
  width: fit-content;
  max-width: 100%;
  font-size: clamp(14px, 4vw, 18px);
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.5s ease;
}

.left { align-self: flex-start; }
.right {
  align-self: flex-end;
  background: linear-gradient(45deg, #ff1493, #ff69b4);
}

.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>
<body>

<!-- Screen 1 -->
<div class="screen active" id="screen1">
  <h1 id="countdown" class="fancy">3</h1>
</div>

<!-- Screen 2 -->
<div class="screen" id="screen2">
  <img src="image1.png">
  <h1 class="fancy">Loading your birthday surprise...</h1>
</div>

<!-- Screen 3 -->
<div class="screen" id="screen3">
  <h1 class="fancy">Tap anywhere 💖</h1>
</div>

<!-- Screen 4 -->
<div class="screen" id="screen4">
  <img src="gif1.gif">
  <h1 class="fancy">Meri Bhaluu turned 17 today 🎉</h1>
  <button onclick="nextScreen(5)">Next ➡️</button>
</div>

<!-- Screen 5 -->
<div class="screen" id="screen5">
  <h1 class="fancy">A Cake For You 🎂</h1>
  <img src="gif2.gif">
  <button onclick="nextScreen(6)">Yayy 🎉</button>
</div>

<!-- Screen 6 -->
<div class="screen" id="screen6" style="align-items:flex-start; overflow-y:auto;">
  <h1 class="fancy" style="width:100%; text-align:center;">A Special Message 💖</h1>
  <div id="messageContainer"></div>
</div>

<script>
let current = 1;

function nextScreen(num) {
  document.getElementById("screen" + current).classList.remove("active");
  document.getElementById("screen" + num).classList.add("active");
  current = num;

  if (num === 6) showMessage();
}

// ✅ PERFECT COUNTDOWN
window.addEventListener("load", () => {
  let count = 3;
  const el = document.getElementById("countdown");

  function run() {
    el.innerText = count;

    if (count > 0) {
      count--;
      setTimeout(run, 1000);
    } else {
      setTimeout(() => {
        nextScreen(2);
        setTimeout(() => nextScreen(3), 2000);
      }, 800);
    }
  }

  setTimeout(run, 300);
});

// Tap
window.addEventListener("click", () => {
  if (current === 3) nextScreen(4);
});

// Message
const paragraphs = [
"Meri pyaari si Bhaluu,",
"Sach bolu toh na aap ekdum God gifted ho ✨ Itni kind, itni genuine… aaj kal aise log milte hi kahan hai yaarr 🥺",
"Aap hamesha mere saath rehti ho, chahe situation kaisi bhi ho… Mujhe kabhi akela feel nahi hone deti 🤍 Aur honestly, aap mujhe dukhi hone hi nahi deti… always cheer me up 💫",
"Aur aapke voice notes… uff 😭💖 Itne pyaare gaane bhejti ho aap… literally unhe sunkar dil khush ho jata hai pura 🎶 Woh baat alag hai kai bar dhamkiyan bhi mil jati hai par thikh hai 😅 Woh alag baat hai aap 'hatt' aur 'haww' bahut bolti ho 😂 Par jab aap bolti ho na… pata nahi kyun, accha hi lagta hai ❤️",
"Aap sirf achi nahi ho… aap bohot pyaari ho yaar 💎 Aur mujhe genuinely bohot khushi hoti hai ki aap meri life ka part ho",
"Aur ek baat toh hamesha sach rahegi 😏 Age mein chahe aap kitni bhi badi ho jao… mere se chhoti hi rahogi 😂 Thodi si bauni si, butki si.. Meri Laadli ho aap 🤏😆",
"Aur ab… NEET ke liye 💪 Mujhe pata hai aap bohot mehnat kar rahi ho, aur aap definitely apna goal achieve kar loge 🔥 Bas aise hi focused rehna… I’m always rooting for you ❤️ All the very best future doctor 👩‍⚕️✨",
"Aur ab toh sidha 1 mahine baad hi baat karo paoge mere sath.. Yaad rakhunga woh sari baate jo humne ki, And.. Now at last",
"Happy Birthday meri pyaari si Kaynat ❤️ Hamesha sukhi raho zindagi bhar 💖"
];

function showMessage() {
  const container = document.getElementById("messageContainer");
  container.innerHTML = "";

  paragraphs.forEach((text, i) => {
    const msg = document.createElement("div");
    msg.className = "message " + (i % 2 === 0 ? "left" : "right");
    msg.innerText = text;

    container.appendChild(msg);

    setTimeout(() => msg.classList.add("show"), i * 600);
  });
}
</script>

</body>
</html>
